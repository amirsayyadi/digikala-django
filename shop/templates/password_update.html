{% extends 'base.html' %}



{% block content %}

    <!--Header-->>
    <header class="bg-dark py-5">
        <div class="container px-4 px-lg-5 my-5">
            <div class="text-center text-white">
                <h1 class="display-4 fw-bolder"> ویرایش رمز عبور </h1>
                <p class="lead fw-normal text-white-50 mb-0"> میتوانید رمز عبور خود را ویرایش کنید </p>
            </div>
        </div>
    </header>

    <!--Form-->
    <div class="container">
    <div class="row">
        <center><br>
            <div class=""col-10>
                <form method="POST" action="{% url 'password_update' %}">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            
            </div>
        </center>
    </div>
    </div>

    <br><br>

{% endblock %}
